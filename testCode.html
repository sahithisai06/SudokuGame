<!DOCTYPE html>
<html lang="en">  
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudoku Game</title>

    <style>
      .sudoku-board-css{
      display:grid;
      grid-template-columns:repeat(9,50px);
      grid-template-rows:repeat(9,50px);
    }

    .sudoku-cell{
        width:50px;
        height:50px;
        text-align:center;
        font-size:20px;
        border:1px solid black;
    }

    .bold-right{
        border-right:4px solid black;
    }

    .bold-bottom{
        border-bottom:4px solid black;
    }

    .bold-left{
        border-left:4px solid black;
    }

    .bold-top{
        border-top:4px solid black;
    }

</style>
</head>

<body>

<h1>Sudoku Game</h1>

<div id="sudoku-board" class="sudoku-board-css"></div>

<br>
<button id="new-game">New Game</button>

<script>

const boardElement = document.getElementById('sudoku-board');
const newGameButton = document.getElementById('new-game');

function generateBoard(){

    boardElement.innerHTML = "";
    for(let i=0;i<9;i++){

    for(let j=0;j<9;j++){

        const cell = document.createElement("input");
        cell.type="text";
        cell.maxLength=1;
        cell.classList.add("sudoku-cell");

        cell.addEventListener("input",()=>{
            cell.value = cell.value.replace(/[^1-9]/g,"");
        });

        if((j+1)%3===0){
            cell.classList.add("bold-right");
        }

        if((i+1)%3===0){
            cell.classList.add("bold-bottom");
        }

        if(j%3===0){
            cell.classList.add("bold-left");
        }

        if(i%3===0){
            cell.classList.add("bold-top");
        }

        boardElement.appendChild(cell);
    }
  }
}

}

newGameButton.addEventListener("click",generateBoard);

generateBoard();

</script>

</body>
</html>
